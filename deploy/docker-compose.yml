# 一键拉起 VCA + Caddy(自动HTTPS)。
# 准备：
#   1) Caddyfile 里 your-domain.com 改成你的域名（A记录已指向本机公网IP）
#   2) 用 docker compose 时，把 Caddyfile 里的 `localhost:8080` 改成 `vca:8080`
#      （容器间用服务名互访，不是 localhost）
#   3) 在同目录建 .env 写入下面的变量，然后：docker compose -f deploy/docker-compose.yml up -d
#
# .env 示例：
#   DASHSCOPE_API_KEY=sk-xxx
#   DEEPSEEK_API_KEY=sk-yyy
#   KIMI_ENABLED=false
#   MOONSHOT_API_KEY=sk-zzz

services:
  vca:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: real
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEEPSEEK_ENABLED: "true"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_PROXY: ""
      KIMI_ENABLED: ${KIMI_ENABLED:-false}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-http://192.168.9.215:13000/v1}
    expose:
      - "8080"          # 只对内网暴露，由 caddy 转发，不直接对公网开 8080

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [vca]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
